username_en: Raphael Waldemar
user_description_en: Since earning my degree in Electrical Engineering from UFMT, I have always been driven by curiosity to understand how things work — and, more importantly, how they can work better. Early in my career, as an intern at Eletronorte, I discovered the real impact that well-structured processes have on teams' day-to-day activities. This mindset stayed with me when I joined ATIVA as a Support Analyst, where I immersed myself in solution integration, customer support, and continuous improvement. Over time, I progressed to Project Coordinator, expanding my role into governance, metrics, standards, and operational efficiency. Combining hands-on experience with academic development — including an MBA in Project Management, a postgraduate degree in Production Engineering, and certifications such as Green Belt — strengthened my passion for management. This natural path led me to the challenge of working as a PMO Manager, leading people, structuring processes, developing teams, and transforming strategies into real results. Above all, my journey continues to be about evolving, learning, and helping teams deliver their best.
